stages:
    - tests
    - report

services:
    - docker:29.5.2-dind

run-tests:
    stage: tests
    image: docker:29.5.2
    script: 
        - docker compose up api-tests || true
    after_script:
        - docker compose up report
    artifacts:
        paths:
            - allure-report
        when: on_success
        expire_in: 90 days
        
pages:
    stage: report
    needs:
        - run_tests
    script:
        - mkdir public
        - cp -r allure-report/* public
    artifacts:
        when: on_success
        expire_in: never
        paths:
            - public